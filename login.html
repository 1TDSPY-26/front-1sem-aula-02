<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESPORTE TOTAL - LOGIN</title>
    <link rel="icon" href="./img/favicon.png" />
    <link rel="stylesheet" href="./css/main.css" />
  </head>

  <body>

    <header class="cabecalho">
      <nav class="cabecalho__nav">
        <ul class="cabecalho__ul">
          <li class="cabecalho__li"><a aria-label="Acessar página principal" class="cabecalho__a cabecalho__a--active" href="./index.html">HOME</a></li>
        </ul>
      </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero__container">
                <h1 class="hero__title">CONTROLE DE ACESSO</h1>
          
                    <form action="#" method="GET">
                        <fieldset>
                            <legend>LOGIN</legend>
                            <div>
                                <label for="idEmail">Email:</label>
                                <input type="email" name="email" id="idEmail" placeholder="Digite seu email" minlength="13" maxlength="150" required>  <!-- Existem vários tipos de input type -->
                            </div>
                            <div>
                                <label for="idSenha">Senha:</label>
                                <input type="password" name="email" id="idSenha" placeholder="Digite sua senha" minlength="5" maxlength="20" required>
                            </div>
                            <div>
                                <button type="submit" id="btnEntrar">Entrar</button>
                            </div>
                        </fieldset>
                    </form>

                Não tem registro?<a aria-label="Para se cadastrar no sistema." class="hero__btn" href="./cadastro.html">clique aqui</a>
            </div>
        </section>
    </main>

    <footer>
      <p>Minha Empresa &copy; - 2026 Todos os direitos reservados</p>
    </footer>
  </body>
</html>
