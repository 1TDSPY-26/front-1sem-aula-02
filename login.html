<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESPORTE TOTAL - LOGIN</title>
    <link rel="icon" href="./img/favicon.png" />
    <link rel="stylesheet" href="./css/main.css" />

    <script src="./js/scripts.js" defer></script>

</head>

<body>

    <header class="cabecalho">
        <nav aria-label="Menu de navegação principal" class="cabecalho__nav">
            <ul class="cabecalho__ul">
                <li class="cabecalho__li">
                    <a aria-label="Acessar página" class="cabecalho__a cabecalho__a--active"
                        href="./index.html">HOME</a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="conteudo">
        <section class="hero">
            <div class="hero__container hero__container--index">
                <h1 class="hero__title">CONTROLE DE ACESSO</h1>




                <form action="#" method="GET">
                    <fieldset>
                        <legend >LOGIN</legend>
                        <div>
                            <label for="idEmail">Email</label>
                            <input type="email" name="email" id="idEmail" placeholder="Digite seu email" minlength="13"
                                maxlength="150" required oninvalid="this.setCustomValidity('Verifique suas informações!')">
                        </div>
                        <div>
                            <label for="idSenha">Senha</label>
                            <input type="password" name="senha" id="idSenha" placeholder="Digite sua senha" minlength="5"
                                maxlength="30" required>
                        </div>
                        <div>

                            <button type="submit" id="btnEntrar">Entrar</button>
                        </div>
                    </fieldset>
                </form>

                Não tem registro?<a aria-label="Para se cadastrar no sistema." class="hero__btn"
                    href="./cadastro.html">clique aqui</a>
            </div>
        </section>
    </main>

    <footer class="rodape">
        <p class="rodape__cpr">ESPORTE TOTAL &copy; - 2026 Todos os direitos reservados</p>
    </footer>
 
</body>

</html>
